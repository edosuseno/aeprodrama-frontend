<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background gradient ungu ke pink -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background bulat sudut seperti ikon HP -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Ornamen awan oriental sudut kiri atas -->
  <path d="M8 20 Q12 12 20 15 Q16 8 24 10 Q20 4 28 8"
        stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <circle cx="8"  cy="22" r="3.5" fill="white" opacity="0.12"/>
  <circle cx="14" cy="16" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="21" cy="12" r="3"   fill="white" opacity="0.12"/>

  <!-- Ornamen awan oriental sudut kanan bawah -->
  <path d="M92 80 Q88 88 80 85 Q84 92 76 90 Q80 96 72 92"
        stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <circle cx="92" cy="78" r="3.5" fill="white" opacity="0.12"/>
  <circle cx="86" cy="84" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="79" cy="88" r="3"   fill="white" opacity="0.12"/>

  <!-- Titik dekoratif kecil pojok -->
  <circle cx="82" cy="14" r="2"   fill="white" opacity="0.2"/>
  <circle cx="88" cy="20" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="18" cy="86" r="2"   fill="white" opacity="0.2"/>
  <circle cx="12" cy="80" r="1.2" fill="white" opacity="0.15"/>

  <!-- PLAY BUTTON — segitiga putih bersih tanpa glow -->
  <polygon points="38,30 38,70 72,50" fill="white"/>
</svg>
